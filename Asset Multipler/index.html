<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AssetFlow — Enterprise Asset & Resource Management</title>
  <meta name="description" content="AssetFlow ERP: Centralized asset tracking, allocation, booking, and maintenance management for any organization.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Odoo Enterprise Design System -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────────── -->
<div id="auth-screen"></div>

<!-- ── APP SHELL ───────────────────────────────────────────── -->
<div id="app-shell" class="hidden">
  <aside id="sidebar"></aside>
  <div id="main-content">
    <header id="topbar"></header>
    <main id="view-container"></main>
  </div>
</div>

<!-- ── MODAL OVERLAY ───────────────────────────────────────── -->
<div id="modal-overlay" class="hidden"></div>

<!-- ── TOAST CONTAINER ─────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── SCRIPTS: Load order is critical ─────────────────────── -->
<!-- 1. Core data layer -->
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/rbac.js"></script>
<script src="js/engine.js"></script>

<!-- 2. Global UI helpers (must come before views) -->
<script src="js/helpers.js"></script>

<!-- 3. Views -->
<script src="js/views/dashboard.js"></script>
<script src="js/views/orgSetup.js"></script>
<script src="js/views/assetDirectory.js"></script>
<script src="js/views/allocations.js"></script>
<script src="js/views/booking.js"></script>
<script src="js/views/maintenance.js"></script>
<script src="js/views/audit.js"></script>
<script src="js/views/analytics.js"></script>
<script src="js/views/notifications.js"></script>

<!-- 4. App shell / router (last) -->
<script src="js/app.js"></script>

<script>
  // Set Chart.js global dark defaults after load
  if (typeof Chart !== 'undefined') {
    Chart.defaults.color       = '#666666';
    Chart.defaults.borderColor = '#e8e8e8';
    Chart.defaults.font.family = 'Inter';
  }
</script>
</body>
</html>
